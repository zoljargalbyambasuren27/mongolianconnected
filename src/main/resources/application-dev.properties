spring.application.name=mongolianconnected

# ----------------------
# Datasource settings
# ----------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/mongolianconnected_db?charSet=UTF8
spring.datasource.username=admin
spring.datasource.password=Inception123#$;
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------------
# JPA/Hibernate settings
# -----------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -----------------------------
# HikariCP settings (connection pool)
# -----------------------------
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=HikariPool-1

# -----------------------------
# Optional: Timezone
# -----------------------------
spring.jpa.properties.hibernate.jdbc.time_zone=UTC